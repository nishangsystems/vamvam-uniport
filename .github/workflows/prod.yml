name: CI/CD Pipeline

on:
  push:
    branches:
      - 'production' 

permissions:
  contents: write

jobs:
  nextjs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Environment Variables
        run: cp .env.prod .env 

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.13.0'

      - name: Install Yarn
        run: npm install --global yarn

      - name: Install dependencies
        run: yarn install

      - name: Ensure Project Builds
        env:
          CI: false
        run: npm run build --verbose

      - name: Archive production artifacts for standalone Next.js
        run: |
          # Verify standalone build exists
          if [ ! -d ".next/standalone" ]; then
            echo "ERROR: standalone build not found. Make sure next.config.js has output: 'standalone'"
            exit 1
          fi
          
          # Prepare deployment package
          mkdir deploy-package
          
          # Copy standalone server and dependencies
          cp -r .next/standalone/* deploy-package/
          
          # Copy static assets
          mkdir -p deploy-package/.next
          cp -r .next/static deploy-package/.next/
          
          # Copy public folder if it exists
          cp -r public deploy-package/ 2>/dev/null || true
          
          # Copy environment file
          cp .env deploy-package/ 2>/dev/null || true
          
          # Create zip from deployment package
          cd deploy-package
          zip -r ../vamvamuniport.zip .
          cd ..
          
          echo "✅ Production deployment package created successfully"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vamvamuniport
          path: ./vamvamuniport.zip

  deploy-to-server:
    name: Deploy artifact to production server
    runs-on: ubuntu-latest
    needs: nextjs-build
    environment: production 
    steps:
      - name: Download app build
        uses: actions/download-artifact@v4
        with:
          name: vamvamuniport

      - name: Create deployment directory
        run: mkdir -p vamvamuniport

      - name: Unzip contents
        run: unzip vamvamuniport.zip -d vamvamuniport/

      - name: Deploy and start Next.js on production server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Create backup before deployment (good for production)
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_PROD_USERNAME }}@${{ secrets.SSH_PROD_HOST }} << 'EOF'
            cd /var/www/html
            if [ -d "vamvamuniport" ]; then
              mv vamvamuniport vamvamuniport_backup_$(date +%Y%m%d_%H%M%S)
              echo "✅ Backup created"
            fi
          EOF
          
          # Copy files to production server
          scp -r -o StrictHostKeyChecking=no ./vamvamuniport/ ${{ secrets.SSH_PROD_USERNAME }}@${{ secrets.SSH_PROD_HOST }}:/var/www/html/
          
          # Start Next.js on production server
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_PROD_USERNAME }}@${{ secrets.SSH_PROD_HOST }} << 'EOF'
            cd /var/www/html/vamvamuniport
            
            # Install production dependencies if needed
            if [ -f "yarn.lock" ]; then
              yarn install --production --frozen-lockfile
            elif [ -f "package-lock.json" ]; then
              npm ci --production
            fi
            
            # Stop existing process if running
            pkill -f "node server.js" || true
            
            # Start Next.js with node (consider using PM2 for production)
            NODE_ENV=production nohup node server.js > app.log 2>&1 &
            
            echo "✅ Production Next.js app started with PID: $!"
            
            # Optional: Verify app is running
            sleep 5
            if pgrep -f "node server.js" > /dev/null; then
              echo "✅ Application is running successfully"
            else
              echo "⚠️ Warning: Application may not have started correctly"
              exit 1
            fi
          EOF

      - name: Make notify.sh executable
        run: chmod +x notify.sh

      - name: Notify Discord on success
        run: bash notify.sh pass "${{ secrets.WEBHOOK_URL }}" "production"
  
  notify_on_failure:
    runs-on: ubuntu-latest
    needs: deploy-to-server
    if: ${{ failure() || cancelled() }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Make notify.sh executable
        run: chmod +x notify.sh

      - name: Notify Discord on failure
        run: bash notify.sh fail "${{ secrets.WEBHOOK_URL }}" "production"